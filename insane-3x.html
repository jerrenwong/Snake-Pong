<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Snake Pong — INSANE @ 3× | Off-Distribution Challenge</title>
  <meta name="description" content="The INSANE Snake-Pong AI was trained at 2× speed. Here it plays at 3× speed — its policy hasn't seen these dynamics, so the result is a uniquely brittle opponent. Single-page browser experiment." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="canonical" href="https://jerrenwong.github.io/Snake-Pong/insane-3x.html" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Snake Pong — INSANE @ 3×" />
  <meta property="og:description" content="The 2×-trained INSANE policy thrown into a 3×-speed match — off-distribution, unpredictable, fragile." />
  <meta property="og:url" content="https://jerrenwong.github.io/Snake-Pong/insane-3x.html" />
  <meta property="og:image" content="https://jerrenwong.github.io/Snake-Pong/og-image.png" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0a'/%3E%3Crect x='4'  y='14' width='10' height='4' fill='%232af'/%3E%3Crect x='18' y='14' width='10' height='4' fill='%23f33'/%3E%3Ccircle cx='16' cy='16' r='2.2' fill='%23fff'/%3E%3C/svg%3E" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }
    #header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    h1 {
      font-size: 1.7rem;
      letter-spacing: 0.16em;
      color: #fff;
      text-shadow: 0 0 24px #f334;
    }
    h1 .qualifier {
      color: #f88;
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      margin-left: 10px;
    }
    .home-link {
      color: #555;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      border: 1px solid #2a2a2a;
      padding: 5px 14px;
      transition: color 0.1s, border-color 0.1s;
    }
    .home-link:hover { color: #0ff; border-color: #0ff; }

    #subtitle {
      color: #777;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      text-align: center;
      max-width: 640px;
      line-height: 1.7;
    }
    #subtitle .hot { color: #f88; }

    #scoreboard {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 10px;
    }
    .score-block { text-align: center; }
    .score-block .name {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .score-block .pts {
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
    }
    #p1-score .pts { color: #2af; }
    #p2-score .pts { color: #f33; }
    .score-sep { font-size: 1.4rem; color: #333; padding-bottom: 4px; }

    #canvas-wrap {
      position: relative;
      border: 2px solid #222;
      flex-shrink: 0;
    }
    canvas { display: block; }
    @media (max-width: 960px) {
      body { padding: 4px; }
      h1 { font-size: 1.05rem; }
      h1 .qualifier { font-size: 0.7rem; }
      #canvas-wrap { width: 100vw; max-width: 100vw; overflow: hidden; }
      #canvas-wrap canvas { width: 100%; height: auto; }
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
      gap: 18px;
    }
    #overlay h2 {
      font-size: 1.4rem;
      letter-spacing: 0.14em;
      text-shadow: 0 0 20px currentColor;
      color: #f88;
    }
    #overlay p {
      color: #888;
      font-size: 0.85rem;
      max-width: 320px;
      text-align: center;
      line-height: 1.65;
    }
    #start-btn {
      background: transparent;
      border: 2px solid #f33;
      color: #f88;
      padding: 10px 32px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    #start-btn:hover { background: #f33; color: #200; }
    #start-btn:disabled { opacity: 0.5; cursor: wait; border-color: #555; color: #555; }
  </style>
</head>
<body>

<div id="header">
  <h1>SNAKE PONG <span class="qualifier">INSANE @ 3×</span></h1>
  <a class="home-link" href="./">↩ home</a>
</div>

<p id="subtitle">
  The <span class="hot">INSANE</span> policy was trained at 2× snake speed.
  Here it's running at <span class="hot">3×</span> — off-distribution.
  Same brain, harder dynamics. Beat what shouldn't even work.
</p>

<div id="scoreboard">
  <div class="score-block" id="p1-score">
    <div class="name">P1 (you)</div>
    <div class="pts" id="p1-pts">0</div>
  </div>
  <div class="score-sep">–</div>
  <div class="score-block" id="p2-score">
    <div class="name">INSANE</div>
    <div class="pts" id="p2-pts">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <h2 id="ov-title">INSANE @ 3×</h2>
    <p id="ov-msg">Arrow keys / WASD. First to 7.<br>The model has never seen this speed.</p>
    <button id="start-btn">START</button>
  </div>
</div>

<script type="module" src="src/insane-3x.js"></script>
</body>
</html>
