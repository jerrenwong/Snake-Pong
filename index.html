<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.18em;
      margin-bottom: 14px;
      color: #fff;
      text-shadow: 0 0 24px #0ff3;
    }

    #config-panel {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cfg-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cfg-item .cfg-label {
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cfg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      width: 100px;
      accent-color: #0ff;
      cursor: pointer;
    }

    .cfg-val {
      color: #0ff;
      font-weight: bold;
      min-width: 22px;
      text-align: center;
      font-size: 0.95rem;
    }

    #scoreboard {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 10px;
    }

    .score-block { text-align: center; }
    .score-block .name {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .score-block .pts {
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
    }
    #p1-score .pts { color: #2af; }
    #p2-score .pts { color: #f62; }

    .score-sep {
      font-size: 1.4rem;
      color: #333;
      padding-bottom: 4px;
    }

    #canvas-wrap {
      position: relative;
      border: 2px solid #222;
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
      gap: 16px;
    }

    #overlay h2 {
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 20px currentColor;
    }

    #overlay p {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.65;
    }

    #start-btn {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 10px 32px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    #start-btn:hover { background: #0ff; color: #000; }

    #hint {
      margin-top: 8px;
      font-size: 0.72rem;
      color: #383838;
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<h1>SNAKE PONG</h1>

<div id="config-panel">
  <div class="cfg-item">
    <span class="cfg-label">Snake Length</span>
    <div class="cfg-row">
      <input type="range" id="len-sl" min="3" max="20" value="6" />
      <span class="cfg-val" id="len-v">6</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Snake Speed</span>
    <div class="cfg-row">
      <input type="range" id="spd-sl" min="1" max="10" value="3" />
      <span class="cfg-val" id="spd-v">3</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Ball Speed</span>
    <div class="cfg-row">
      <input type="range" id="bspd-sl" min="1" max="10" value="4" />
      <span class="cfg-val" id="bspd-v">4</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Win Score</span>
    <div class="cfg-row">
      <input type="range" id="win-sl" min="1" max="20" value="7" />
      <span class="cfg-val" id="win-v">7</span>
    </div>
  </div>
</div>

<div id="scoreboard">
  <div class="score-block" id="p1-score">
    <div class="name">P1 &nbsp;W·A·S·D</div>
    <div class="pts" id="p1-pts">0</div>
  </div>
  <div class="score-sep">–</div>
  <div class="score-block" id="p2-score">
    <div class="name">P2 &nbsp;↑ ← ↓ →</div>
    <div class="pts" id="p2-pts">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <h2 id="ov-title">SNAKE PONG</h2>
    <p id="ov-msg">
      Control your snake to deflect the ball past your opponent.<br>
      Don't hit the walls or the center divider!
    </p>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<div id="hint">P1: W A S D &nbsp;·&nbsp; P2: Arrow Keys &nbsp;·&nbsp; ESC: Pause</div>

<script>
(() => {
  // ── Constants ──────────────────────────────────────────────────────────────
  const CELL = 20;
  const COLS = 36;   // even number so wall fits cleanly
  const ROWS = 26;
  const W = COLS * CELL;
  const H = ROWS * CELL;

  // Wall occupies the two center columns so it's visually clear
  const WALL_L = COLS / 2 - 1;  // col 17
  const WALL_R = COLS / 2;       // col 18

  const canvas = document.getElementById('game');
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── UI refs ────────────────────────────────────────────────────────────────
  const lenSl  = document.getElementById('len-sl');
  const lenV   = document.getElementById('len-v');
  const spdSl  = document.getElementById('spd-sl');
  const spdV   = document.getElementById('spd-v');
  const bSpdSl = document.getElementById('bspd-sl');
  const bSpdV  = document.getElementById('bspd-v');
  const winSl  = document.getElementById('win-sl');
  const winV   = document.getElementById('win-v');
  const overlay   = document.getElementById('overlay');
  const ovTitle   = document.getElementById('ov-title');
  const ovMsg     = document.getElementById('ov-msg');
  const startBtn  = document.getElementById('start-btn');
  const p1Pts     = document.getElementById('p1-pts');
  const p2Pts     = document.getElementById('p2-pts');

  lenSl.addEventListener('input',  () => lenV.textContent  = lenSl.value);
  spdSl.addEventListener('input',  () => spdV.textContent  = spdSl.value);
  bSpdSl.addEventListener('input', () => bSpdV.textContent = bSpdSl.value);
  winSl.addEventListener('input',  () => winV.textContent  = winSl.value);

  // ── Pre-render static background ──────────────────────────────────────────
  const bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bgCtx = bgCanvas.getContext('2d');

  function buildBackground() {
    bgCtx.fillStyle = '#0e0e0e';
    bgCtx.fillRect(0, 0, W, H);

    // Subtle grid lines
    bgCtx.strokeStyle = '#161616';
    bgCtx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      bgCtx.beginPath();
      bgCtx.moveTo(c * CELL, 0);
      bgCtx.lineTo(c * CELL, H);
      bgCtx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      bgCtx.beginPath();
      bgCtx.moveTo(0, r * CELL);
      bgCtx.lineTo(W, r * CELL);
      bgCtx.stroke();
    }

    // Center wall — solid block
    bgCtx.fillStyle = '#1e1e1e';
    bgCtx.fillRect(WALL_L * CELL, 0, 2 * CELL, H);

    // Wall bricks
    bgCtx.strokeStyle = '#2c2c2c';
    bgCtx.lineWidth = 1;
    for (let r = 0; r < ROWS; r++) {
      bgCtx.strokeRect(WALL_L * CELL + 1, r * CELL + 1, 2 * CELL - 2, CELL - 2);
    }

    // Left-side tint
    bgCtx.fillStyle = 'rgba(0, 160, 255, 0.03)';
    bgCtx.fillRect(0, 0, WALL_L * CELL, H);

    // Right-side tint
    bgCtx.fillStyle = 'rgba(255, 100, 0, 0.03)';
    bgCtx.fillRect(WALL_R * CELL, 0, W - WALL_R * CELL, H);
  }
  buildBackground();

  // ── Game state ─────────────────────────────────────────────────────────────
  let state = 'menu'; // menu | playing | paused | roundend | gameover
  let score1 = 0, score2 = 0;
  let s1, s2, ball;

  // ── Input ─────────────────────────────────────────────────────────────────
  // Process direction changes immediately on keydown (not per tick) to eliminate input lag.
  // keydown also fires on key-repeat when held, so no need for a separate keys map.
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === 'Escape') {
      if (state === 'playing') pause();
      else if (state === 'paused') resume();
      return;
    }
    if (state !== 'playing' || !s1 || !s2) return;

    // Check against dir (actual current movement) — nextDir could already be a queued
    // turn, so checking it would allow reversals like right→up→down (180° from right).
    const d1 = s1.dir;
    if      ((e.key === 'a' || e.key === 'A') && d1.x !== 1)  s1.nextDir = { x: -1, y:  0 };
    else if ((e.key === 'd' || e.key === 'D') && d1.x !== -1) s1.nextDir = { x:  1, y:  0 };
    else if ((e.key === 'w' || e.key === 'W') && d1.y !== 1)  s1.nextDir = { x:  0, y: -1 };
    else if ((e.key === 's' || e.key === 'S') && d1.y !== -1) s1.nextDir = { x:  0, y:  1 };

    const d2 = s2.dir;
    if      (e.key === 'ArrowLeft'  && d2.x !== 1)  s2.nextDir = { x: -1, y:  0 };
    else if (e.key === 'ArrowRight' && d2.x !== -1) s2.nextDir = { x:  1, y:  0 };
    else if (e.key === 'ArrowUp'    && d2.y !== 1)  s2.nextDir = { x:  0, y: -1 };
    else if (e.key === 'ArrowDown'  && d2.y !== -1) s2.nextDir = { x:  0, y:  1 };
  });

  // ── RAF loop ───────────────────────────────────────────────────────────────
  let rafId = null;
  let lastTs = 0;
  let tickAccum = 0;
  let tickMs = 400;     // snake tick interval, updated on round start
  let ballTickAccum = 0;
  let ballTickMs = 200; // ball tick interval, updated on round start

  function startLoop() {
    stopLoop();
    lastTs = performance.now();
    tickAccum = 0;
    ballTickAccum = 0;
    rafId = requestAnimationFrame(loop);
  }

  function stopLoop() {
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    const dt = Math.min(ts - lastTs, 150); // cap to avoid spiral on tab blur
    lastTs = ts;

    if (state === 'playing') {
      // Snake ticks
      tickAccum += dt;
      while (tickAccum >= tickMs) {
        tick();
        tickAccum -= tickMs;
        if (state !== 'playing') { tickAccum = 0; ballTickAccum = 0; break; }
      }

      // Ball ticks (independent rate)
      if (state === 'playing') {
        ballTickAccum += dt;
        while (ballTickAccum >= ballTickMs) {
          const scored = stepBall();
          ballTickAccum -= ballTickMs;
          if (scored || state !== 'playing') { ballTickAccum = 0; break; }
        }
      }
    }

    draw();
  }

  // snake slider 1-10 → tps 1.5 - 7
  function getSnakeTps() {
    const s = parseInt(spdSl.value);
    return 1.5 + (s - 1) * (5.5 / 9);
  }

  // ball slider 1-10 → tps 1 - 12
  function getBallTps() {
    const s = parseInt(bSpdSl.value);
    return 1 + (s - 1) * (11 / 9);
  }

  // ── Initialise entities ────────────────────────────────────────────────────
  function initEntities() {
    const len = parseInt(lenSl.value);

    // P1: head near left-center, moving right
    const h1x = Math.floor(WALL_L / 2);
    const hy  = Math.floor(ROWS / 2);
    s1 = {
      body: Array.from({ length: len }, (_, i) => ({ x: h1x - i, y: hy })),
      dir:     { x: 1, y: 0 },
      nextDir: { x: 1, y: 0 },
      color: '#2af',
    };

    // P2: head near right-center, moving left
    const h2x = WALL_R + Math.floor((COLS - WALL_R) / 2);
    s2 = {
      body: Array.from({ length: len }, (_, i) => ({ x: h2x + i, y: hy })),
      dir:     { x: -1, y: 0 },
      nextDir: { x: -1, y: 0 },
      color: '#f62',
    };

    // Ball: spawn inside the left or right half
    const side = Math.random() < 0.5 ? -1 : 1;
    const bx = side < 0
      ? Math.floor(WALL_L / 2)
      : WALL_R + Math.floor((COLS - WALL_R) / 2);
    ball = {
      x: bx,
      y: Math.floor(ROWS / 2),
      vx: side,
      vy: Math.random() < 0.5 ? 1 : -1,
    };
  }

  // ── Game logic ─────────────────────────────────────────────────────────────
  function stepSnake(snake) {
    snake.dir = snake.nextDir;
    const head = snake.body[0];
    snake.body.unshift({ x: head.x + snake.dir.x, y: head.y + snake.dir.y });
    snake.body.pop();
  }

  function isWall(x) {
    return x === WALL_L || x === WALL_R;
  }

  function snakeHitsDeath(snake) {
    const h = snake.body[0];
    // Outer walls
    if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS) return true;
    // Center wall
    if (isWall(h.x)) return true;
    // Self collision (skip first segment)
    return snake.body.slice(1).some(c => c.x === h.x && c.y === h.y);
  }

  function snakesCollide() {
    const h1 = s1.body[0], h2 = s2.body[0];
    if (h1.x === h2.x && h1.y === h2.y) return 'both';
    if (s2.body.some(c => c.x === h1.x && c.y === h1.y)) return 's1';
    if (s1.body.some(c => c.x === h2.x && c.y === h2.y)) return 's2';
    return null;
  }

  function stepBall() {
    let nx = ball.x + ball.vx;
    let ny = ball.y + ball.vy;

    // Top/bottom bounce
    if (ny < 0 || ny >= ROWS) {
      ball.vy = -ball.vy;
      ny = ball.y + ball.vy;
    }

    // Scoring: ball exits left = P1 missed = P2 scores; exits right = P2 missed = P1 scores
    if (nx < 0)    { awardPoint(2); return true; }
    if (nx >= COLS){ awardPoint(1); return true; }

    // Snake collision — check horizontal and vertical axes separately
    const allSegs = [...s1.body, ...s2.body];
    const hHit = allSegs.some(c => c.x === nx && c.y === ball.y);
    const vHit = allSegs.some(c => c.x === ball.x && c.y === ny);
    const dHit = !hHit && !vHit && allSegs.some(c => c.x === nx && c.y === ny);

    if (hHit || vHit || dHit) {
      if (hHit) ball.vx = -ball.vx;
      if (vHit) ball.vy = -ball.vy;
      if (dHit) { ball.vx = -ball.vx; ball.vy = -ball.vy; }
      nx = ball.x + ball.vx;
      ny = Math.max(0, Math.min(ROWS - 1, ball.y + ball.vy));
    }

    ball.x = nx;
    ball.y = ny;
    return false;
  }

  function awardPoint(playerWhoScored) {
    if (playerWhoScored === 1) score1++;
    else score2++;
    p1Pts.textContent = score1;
    p2Pts.textContent = score2;

    const winScore = parseInt(winSl.value);
    if (score1 >= winScore || score2 >= winScore) {
      endGame(score1 >= winScore ? 1 : 2);
    } else {
      endRound();
    }
  }

  function tick() {
    stepSnake(s1);
    stepSnake(s2);

    // Wall/boundary/self death
    const d1 = snakeHitsDeath(s1);
    const d2 = snakeHitsDeath(s2);
    if (d1 && d2) { endRound(); return; }
    if (d1) { score2++; p2Pts.textContent = score2; const w=parseInt(winSl.value); if(score2>=w){endGame(2);}else{endRound();} return; }
    if (d2) { score1++; p1Pts.textContent = score1; const w=parseInt(winSl.value); if(score1>=w){endGame(1);}else{endRound();} return; }

    // Snake vs snake
    const sc = snakesCollide();
    if (sc === 'both') { endRound(); return; }
    if (sc === 's1') { score2++; p2Pts.textContent = score2; const w=parseInt(winSl.value); if(score2>=w){endGame(2);}else{endRound();} return; }
    if (sc === 's2') { score1++; p1Pts.textContent = score1; const w=parseInt(winSl.value); if(score1>=w){endGame(1);}else{endRound();} return; }
  }

  // ── State transitions ──────────────────────────────────────────────────────
  function startGame() {
    score1 = 0; score2 = 0;
    p1Pts.textContent = 0; p2Pts.textContent = 0;
    startRound();
  }

  function startRound() {
    tickMs     = 1000 / getSnakeTps();
    ballTickMs = 1000 / getBallTps();
    overlay.style.display = 'none';
    state = 'playing';
    initEntities();
    startLoop();
  }

  function endRound() {
    state = 'roundend';
    // Show current score briefly then restart
    setTimeout(() => { if (state === 'roundend') startRound(); }, 1000);
  }

  function pause() {
    state = 'paused';
    ovTitle.textContent = 'PAUSED';
    ovMsg.textContent   = 'Press ESC or click Resume to continue.';
    startBtn.textContent = 'RESUME';
    overlay.style.display = 'flex';
  }

  function resume() {
    overlay.style.display = 'none';
    state = 'playing';
    lastTs = performance.now();
    tickAccum = 0;
  }

  function endGame(winner) {
    state = 'gameover';
    ovTitle.textContent  = `PLAYER ${winner} WINS!`;
    ovMsg.textContent    = `Final score: ${score1} – ${score2}`;
    startBtn.textContent = 'PLAY AGAIN';
    overlay.style.display = 'flex';
  }

  startBtn.addEventListener('click', () => {
    if (state === 'paused') { resume(); return; }
    startGame();
  });

  // ── Drawing ────────────────────────────────────────────────────────────────
  function drawSnake(snake) {
    const body = snake.body;
    const n = body.length;
    ctx.fillStyle = snake.color;
    for (let i = 0; i < n; i++) {
      const t = i / n;
      ctx.globalAlpha = i === 0 ? 1 : (t * 0.75 > 0.75 ? 0.25 : 1 - t * 0.75);
      const seg = body[i];
      ctx.fillRect(seg.x * CELL + 2, seg.y * CELL + 2, CELL - 4, CELL - 4);
    }
    ctx.globalAlpha = 1;

    // Eyes
    const h = snake.body[0];
    const cx = h.x * CELL + CELL / 2;
    const cy = h.y * CELL + CELL / 2;
    const dx = snake.dir.x, dy = snake.dir.y;
    ctx.fillStyle = '#000';
    [[-dy * 4 + dx * 3, dx * 4 + dy * 3], [dy * 4 + dx * 3, -dx * 4 + dy * 3]]
      .forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.arc(cx + ox, cy + oy, 2, 0, Math.PI * 2);
        ctx.fill();
      });
  }

  function draw() {
    // Blit prerendered background
    ctx.drawImage(bgCanvas, 0, 0);

    if (!s1 || !s2 || !ball) return;

    drawSnake(s1);
    drawSnake(s2);

    // Ball — no shadowBlur (expensive); use a simple white circle with a dim halo instead
    const bx = ball.x * CELL + CELL / 2;
    const by = ball.y * CELL + CELL / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(bx, by, CELL / 2 + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bx, by, CELL / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Initial render
  draw();
  startLoop();
})();
</script>
</body>
</html>
