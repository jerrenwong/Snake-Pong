<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.18em;
      margin-bottom: 14px;
      color: #fff;
      text-shadow: 0 0 24px #0ff3;
    }

    #config-panel {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cfg-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cfg-item .cfg-label {
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cfg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      width: 100px;
      accent-color: #0ff;
      cursor: pointer;
    }

    .cfg-val {
      color: #0ff;
      font-weight: bold;
      min-width: 22px;
      text-align: center;
      font-size: 0.95rem;
    }

    #scoreboard {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 10px;
    }

    .score-block { text-align: center; }
    .score-block .name {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .score-block .pts {
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
    }
    #p1-score .pts { color: #2af; }
    #p2-score .pts { color: #f62; }

    .score-sep {
      font-size: 1.4rem;
      color: #333;
      padding-bottom: 4px;
    }

    #canvas-wrap {
      position: relative;
      border: 2px solid #222;
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
      gap: 16px;
    }

    #overlay h2 {
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 20px currentColor;
    }

    #overlay p {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.65;
    }

    #start-btn {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 10px 32px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    #start-btn:hover { background: #0ff; color: #000; }

    #hint {
      margin-top: 8px;
      font-size: 0.72rem;
      color: #383838;
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<h1>SNAKE PONG</h1>

<div id="config-panel">
  <div class="cfg-item">
    <span class="cfg-label">Snake Length</span>
    <div class="cfg-row">
      <input type="range" id="len-sl" min="3" max="20" value="6" />
      <span class="cfg-val" id="len-v">6</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Snake Speed</span>
    <div class="cfg-row">
      <input type="range" id="spd-sl" min="1" max="10" value="3" />
      <span class="cfg-val" id="spd-v">3</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Ball Speed</span>
    <div class="cfg-row">
      <input type="range" id="bspd-sl" min="1" max="10" value="4" />
      <span class="cfg-val" id="bspd-v">4</span>
    </div>
  </div>
  <div class="cfg-item">
    <span class="cfg-label">Win Score</span>
    <div class="cfg-row">
      <input type="range" id="win-sl" min="1" max="20" value="7" />
      <span class="cfg-val" id="win-v">7</span>
    </div>
  </div>
</div>

<div id="scoreboard">
  <div class="score-block" id="p1-score">
    <div class="name">P1 &nbsp;W·A·S·D</div>
    <div class="pts" id="p1-pts">0</div>
  </div>
  <div class="score-sep">–</div>
  <div class="score-block" id="p2-score">
    <div class="name">P2 &nbsp;↑ ← ↓ →</div>
    <div class="pts" id="p2-pts">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <h2 id="ov-title">SNAKE PONG</h2>
    <p id="ov-msg">
      Control your snake to deflect the ball past your opponent.<br>
      Don't hit the walls or the center divider!
    </p>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<div id="hint">P1: W A S D &nbsp;·&nbsp; P2: Arrow Keys &nbsp;·&nbsp; ESC: Pause</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
