<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.18em;
      color: #fff;
      text-shadow: 0 0 24px #0ff3;
    }

    #settings-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #444;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 3px;
      transition: color 0.1s, border-color 0.1s;
      padding: 0;
      line-height: 1;
    }
    #settings-btn:hover { color: #0ff; border-color: #0ff; }

    /* ── Scoreboard ─────────────────────────────────────────── */
    #scoreboard {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 10px;
    }

    .score-block { text-align: center; }
    .score-block .name {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .score-block .pts {
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
    }
    #p1-score .pts { color: #2af; }
    #p2-score .pts { color: #f62; }

    .score-sep {
      font-size: 1.4rem;
      color: #333;
      padding-bottom: 4px;
    }

    /* ── Game row: key pad | canvas | key pad ───────────────── */
    #game-row {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* ── Key pads ───────────────────────────────────────────── */
    .key-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .key-pad-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    #p1-pad .key-pad-label { color: #1e5a7a; }
    #p2-pad .key-pad-label { color: #7a3a10; }

    .key-row {
      display: flex;
      gap: 5px;
    }

    .key {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid;
      background: #0d0d0d;
    }

    .key-blank {
      visibility: hidden;
    }

    #p1-pad .key {
      border-color: #1a4d6a;
      color: #2af;
      text-shadow: 0 0 8px #2af6;
    }
    #p2-pad .key {
      border-color: #6a3010;
      color: #f62;
      text-shadow: 0 0 8px #f626;
    }

    /* ── Canvas ─────────────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      border: 2px solid #222;
      flex-shrink: 0;
    }

    canvas { display: block; }

    /* ── Game overlay (menu / pause / end) ──────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
    }

    #main-menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #overlay h2 {
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 20px currentColor;
    }

    #overlay p {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.65;
    }

    #start-btn {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 10px 32px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    #start-btn:hover { background: #0ff; color: #000; }

    /* ── Online panel ────────────────────────────────────────── */
    #online-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 8px 28px;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    #online-btn:hover { border-color: #0ff; color: #0ff; }

    #online-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 240px;
    }

    #online-panel h3 {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
    }

    #online-status {
      font-size: 0.78rem;
      color: #666;
      text-align: center;
      min-height: 1em;
    }

    #room-code-wrap {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.08em;
    }

    #room-code {
      color: #0ff;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 0.22em;
      display: block;
      text-align: center;
      margin-top: 2px;
    }

    .online-sep {
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
    }

    .online-join-row {
      display: flex;
      gap: 6px;
    }

    #join-code {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: #eee;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      padding: 7px 12px;
      width: 120px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.1s;
    }
    #join-code:focus { border-color: #0ff; }

    #host-btn, #join-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.1s;
    }
    #host-btn:hover, #join-btn:hover { border-color: #0ff; color: #0ff; }
    #host-btn:disabled, #join-btn:disabled { opacity: 0.35; cursor: default; }

    #online-back {
      background: transparent;
      border: none;
      color: #333;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.1s;
      padding: 4px 0;
    }
    #online-back:hover { color: #888; }

    /* ── Settings modal ─────────────────────────────────────── */
    #settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #settings-modal.open { display: flex; }

    #settings-panel {
      background: #111;
      border: 1px solid #2a2a2a;
      padding: 28px 32px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    #settings-panel h3 {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #444;
      text-align: center;
      text-transform: uppercase;
    }

    .cfg-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .cfg-label {
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cfg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      width: 110px;
      accent-color: #0ff;
      cursor: pointer;
    }

    .cfg-val {
      color: #0ff;
      font-weight: bold;
      min-width: 22px;
      text-align: center;
      font-size: 0.95rem;
    }

    /* ── Power-up toggle ─────────────────────────────────────── */
    .pu-toggle-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #444;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 5px 18px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .pu-toggle-btn:hover { border-color: #0ff; color: #0ff; }
    .pu-toggle-btn.active {
      border-color: #0ff;
      color: #0ff;
      background: rgba(0,255,255,0.07);
    }

    /* ── Power-up legend ─────────────────────────────────────── */
    #powerup-legend {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      align-items: flex-start;
    }

    .pu-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.04em;
    }

    .pu-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-weight: bold;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .mult-group { display: flex; gap: 6px; }

    .mult-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #444;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .mult-btn:hover { border-color: #0ff; color: #0ff; }
    .mult-btn.active {
      border-color: #0ff;
      color: #0ff;
      background: rgba(0,255,255,0.07);
    }

    #close-settings {
      align-self: center;
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      padding: 7px 24px;
      cursor: pointer;
      transition: all 0.1s;
    }
    #close-settings:hover { border-color: #fff; color: #fff; }
  </style>
</head>
<body>

<div id="header">
  <h1>SNAKE PONG</h1>
  <button id="settings-btn" title="Settings">⚙</button>
</div>

<div id="scoreboard">
  <div class="score-block" id="p1-score">
    <div class="name">P1</div>
    <div class="pts" id="p1-pts">0</div>
  </div>
  <div class="score-sep">–</div>
  <div class="score-block" id="p2-score">
    <div class="name">P2</div>
    <div class="pts" id="p2-pts">0</div>
  </div>
</div>

<div id="game-row">

  <!-- P1 key pad (WASD) -->
  <div class="key-pad" id="p1-pad">
    <span class="key-pad-label">Player 1</span>
    <div class="key-row">
      <div class="key key-blank">A</div>
      <div class="key">W</div>
      <div class="key key-blank">D</div>
    </div>
    <div class="key-row">
      <div class="key">A</div>
      <div class="key">S</div>
      <div class="key">D</div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="overlay">

      <!-- Main menu (start / pause / gameover) -->
      <div id="main-menu">
        <h2 id="ov-title">SNAKE PONG</h2>
        <p id="ov-msg">Deflect the ball past your opponent.<br>Avoid the walls and the center divider.</p>
        <button id="start-btn">START GAME</button>
        <button id="online-btn">PLAY ONLINE</button>
      </div>

      <!-- Online mode panel -->
      <div id="online-panel">
        <h3>Online Multiplayer</h3>
        <p id="online-status"></p>

        <button id="host-btn">HOST GAME</button>
        <div id="room-code-wrap">
          Room code
          <span id="room-code"></span>
        </div>

        <div class="online-sep">— OR —</div>

        <div class="online-join-row">
          <input id="join-code" placeholder="XXXXX" maxlength="5" autocomplete="off" spellcheck="false" />
          <button id="join-btn">JOIN</button>
        </div>

        <button id="online-back">← BACK</button>
      </div>

    </div>
  </div>

  <!-- P2 key pad (Arrow keys) -->
  <div class="key-pad" id="p2-pad">
    <span class="key-pad-label">Player 2</span>
    <div class="key-row">
      <div class="key key-blank">←</div>
      <div class="key">↑</div>
      <div class="key key-blank">→</div>
    </div>
    <div class="key-row">
      <div class="key">←</div>
      <div class="key">↓</div>
      <div class="key">→</div>
    </div>
  </div>

</div>

<!-- Power-up legend (shown only when power-ups are enabled) -->
<div id="powerup-legend"></div>

<!-- Settings modal -->
<div id="settings-modal">
  <div id="settings-panel">
    <h3>Settings</h3>

    <div class="cfg-item">
      <span class="cfg-label">Snake Length</span>
      <div class="cfg-row">
        <input type="range" id="len-sl" min="3" max="20" value="6" />
        <span class="cfg-val" id="len-v">6</span>
      </div>
    </div>

    <div class="cfg-item">
      <span class="cfg-label">Ball Speed</span>
      <div class="cfg-row">
        <input type="range" id="bspd-sl" min="1" max="10" value="4" />
        <span class="cfg-val" id="bspd-v">4</span>
      </div>
    </div>

    <div class="cfg-item">
      <span class="cfg-label">Snake Speed</span>
      <div class="mult-group" id="mult-group">
        <button class="mult-btn active" data-mult="1">1×</button>
        <button class="mult-btn"        data-mult="2">2×</button>
        <button class="mult-btn"        data-mult="3">3×</button>
      </div>
    </div>

    <div class="cfg-item">
      <span class="cfg-label">Win Score</span>
      <div class="cfg-row">
        <input type="range" id="win-sl" min="1" max="20" value="7" />
        <span class="cfg-val" id="win-v">7</span>
      </div>
    </div>

    <div class="cfg-item">
      <span class="cfg-label">Power-ups</span>
      <button class="pu-toggle-btn" id="pu-toggle">OFF</button>
    </div>

    <button id="close-settings">CLOSE</button>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
